name: Chromatic — Visual Regression

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

permissions:
  contents: read

env:
  NODE_VERSION: '20.x'

jobs:
  detect-secret:
    name: Detect Chromatic token
    runs-on: ubuntu-latest
    # Skip auto-generated develop -> main release PRs (no visual change vs base)
    if: github.head_ref != 'develop'
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CHROMATIC_PROJECT_TOKEN secret is not set — skipping visual regression check. See .github/workflows/chromatic.yml for setup instructions."
          fi

  chromatic:
    name: Publish Storybook to Chromatic
    needs: detect-secret
    if: needs.detect-secret.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install packages
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitZeroOnChanges: false
