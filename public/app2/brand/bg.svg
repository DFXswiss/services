<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- deep navy base, slightly luminous at the top where the hero sits -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#103a63"/>
      <stop offset="0.32" stop-color="#0c2f52"/>
      <stop offset="0.70" stop-color="#082541"/>
      <stop offset="1"    stop-color="#061c31"/>
    </linearGradient>

    <!-- focal bloom behind the logo / hero -->
    <radialGradient id="bloom" cx="0.5" cy="0.0" r="0.75">
      <stop offset="0"    stop-color="#6CB0FF" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#3E84D6" stop-opacity="0.08"/>
      <stop offset="1"    stop-color="#3E84D6" stop-opacity="0"/>
    </radialGradient>

    <!-- cool aurora sweeping up from the lower-left -->
    <radialGradient id="auroraL" cx="0.16" cy="0.86" r="0.7">
      <stop offset="0" stop-color="#1C5187" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1C5187" stop-opacity="0"/>
    </radialGradient>

    <!-- second aurora low-right, keeps the palette alive without shouting -->
    <radialGradient id="auroraR" cx="0.92" cy="0.7" r="0.6">
      <stop offset="0" stop-color="#2E63A8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2E63A8" stop-opacity="0"/>
    </radialGradient>

    <!-- edge vignette for depth -->
    <radialGradient id="vig" cx="0.5" cy="0.34" r="0.92">
      <stop offset="0"    stop-color="#04101e" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#04101e" stop-opacity="0"/>
      <stop offset="1"    stop-color="#04101e" stop-opacity="0.55"/>
    </radialGradient>

    <!-- fine film grain to defeat gradient banding (premium dark-UI staple) -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- base + light -->
  <rect width="1200" height="1600" fill="url(#base)"/>
  <rect width="1200" height="1600" fill="url(#auroraL)"/>
  <rect width="1200" height="1600" fill="url(#auroraR)"/>
  <rect width="1200" height="1600" fill="url(#bloom)"/>

  <!-- depth -->
  <rect width="1200" height="1600" fill="url(#vig)"/>

  <!-- grain on top, soft-light so it lifts and shades evenly -->
  <rect width="1200" height="1600" filter="url(#grain)" opacity="0.05" style="mix-blend-mode:soft-light"/>
</svg>
